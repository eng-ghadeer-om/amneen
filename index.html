<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMNEEN | آمنين</title>
    <!-- Importing Tajawal for beautiful EN/AR typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Hidden by default, reveals beautifully during the release phase -->
    <div id="geometric-overlay"></div>

    <!-- Top bar for Controls -->
    <header id="top-bar">
        <div class="left-controls">
            <button id="panic-btn" onclick="emergencyClear()">Quick Clear</button>
            <button id="lang-btn" onclick="toggleLanguage()">عربي</button>
        </div>
        <button id="discreet-btn" onclick="toggleDiscreetMode()">Discreet Mode</button>
    </header>

    <main id="app-container">
        <h1 id="app-title">AMNEEN</h1>
        <p class="subtitle" id="dynamic-subtitle">Nothing is saved. Everything is temporary.</p>

        <!-- Phase 1 Secure Attributes retained strictly -->
        <textarea 
            id="canvas" 
            spellcheck="false" 
            autocomplete="off" 
            autocorrect="off" 
            autocapitalize="none" 
            placeholder="The canvas is yours. No one is watching, and nothing is saved. What is weighing on your heart right now?">
        </textarea>

        <button id="burn-btn" onclick="initiateBurn()">Release to the Canvas</button>
    </main>

    <footer id="sos-footer">
        <p><span id="sos-text">Need support?</span> <a href="tel:24441999" id="sos-link">Whispers of Serenity (Oman)</a></p>
    </footer>

    <script src="script.js"></script>   
</body>
</html>
