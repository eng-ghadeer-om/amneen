<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMNEEN | Safe Space</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main id="app-container">
        <h1>AMNEEN</h1>
        <p class="subtitle">Nothing is saved. Everything is temporary.</p>

        <!-- PRIVACY SHIELDED TEXT AREA -->
        <textarea 
            id="canvas" 
            spellcheck="false" 
            autocomplete="off" 
            autocorrect="off" 
            autocapitalize="none" 
            placeholder="What is on your mind? Type freely...">
        </textarea>

        <button id="burn-btn">Release to the Canvas</button>
    </main>

    <footer id="sos-footer">
        <p>Need support? <a href="tel:24441999">Whispers of Serenity (Oman)</a></p>
    </footer>

</body>
</html>
